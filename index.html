<style>

  :root {

    --purple: #7c3aed; --purple-light: #a855f7; --purple-text: #c084fc;
    --red: #dc2626; --red-light: #ef4444; --red-text: #f87171;

    --text-faint: rgba(255,255,255,0.2); --border: rgba(255,255,255,0.06);
    --border-purple: rgba(124,58,237,0.2);
  }
  body { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-panel) 100%); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
  .header { background: linear-gradient(135deg, var(--bg-header) 0%, #0f0b1a 100%); border-bottom: 1px solid var(--border-purple); padding: 20px 24px 16px; }
  .header-brand { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .header-icon { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, var(--purple), var(--purple-light)); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 900; color: #fff; flex-shrink: 0; }
  .header-title { font-size: 18px; font-weight: 800; letter-spacing: -0.02em; color: #fff; }
  .header-sub { font-size: 11px; color: rgba(255,255,255,0.4); font-weight: 500; letter-spacing: 0.02em; }
  .controls-row { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
  .control-group { flex: 1; min-width: 160px; }
  .control-label { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 4px; }
  .platform-select { width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid rgba(124,58,237,0.3); background: rgba(124,58,237,0.1); color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer; outline: none; }
  .platform-select option { background: var(--bg-header); color: var(--text); }
  .scoring-toggle { display: flex; border-radius: 6px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
  .scoring-btn { flex: 1; padding: 8px 0; font-size: 12px; font-weight: 700; border: none; cursor: pointer; background: rgba(255,255,255,0.04); color: var(--text-dim); transition: all 0.15s; }
  .scoring-btn.active { background: linear-gradient(135deg, var(--purple), #6d28d9); color: #fff; }
  .slider-row { display: flex; align-items: center; gap: 10px; }
  .slider-label { font-size: 10px; color: rgba(255,255,255,0.3); }
  .sensitivity-slider { flex: 1; accent-color: var(--purple); height: 4px; cursor: pointer; }
  .search-input { width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); color: var(--text); font-size: 13px; outline: none; }
  .search-input::placeholder { color: rgba(255,255,255,0.3); }
  .pos-filters { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
  .pos-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.08); background: transparent; color: var(--text-dim); font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .pos-btn.active { border-color: rgba(124,58,237,0.5); background: rgba(124,58,237,0.2); color: var(--purple-text); }
  .summary { display: flex; gap: 12px; padding: 16px 24px; flex-wrap: wrap; }
  .summary-card { flex: 1; min-width: 140px; padding: 12px 16px; border-radius: 8px; }
  .summary-card.target { background: rgba(124,58,237,0.08); border: 1px solid rgba(124,58,237,0.15); }
  .summary-card.avoid { background: rgba(220,38,38,0.06); border: 1px solid rgba(220,38,38,0.12); }
  .summary-card.neutral { background: rgba(255,255,255,0.03); border: 1px solid var(--border); }
  .summary-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; }
  .summary-card.target .summary-label { color: rgba(168,85,247,0.7); }
  .summary-card.avoid .summary-label { color: rgba(239,68,68,0.7); }
  .summary-card.neutral .summary-label { color: rgba(255,255,255,0.4); }
  .summary-num { font-size: 28px; font-weight: 800; margin-top: 2px; }
  .summary-card.target .summary-num { color: var(--purple-light); }
  .summary-card.avoid .summary-num { color: var(--red-light); }
  .summary-card.neutral .summary-num { color: var(--text); }
  .summary-desc { font-size: 11px; color: var(--text-dimmer); }
  .info-banner { margin: 0 24px 12px; padding: 10px 14px; border-radius: 6px; background: rgba(124,58,237,0.06); border: 1px solid rgba(124,58,237,0.12); font-size: 12px; color: rgba(255,255,255,0.5); line-height: 1.5; }
  .info-banner strong { color: var(--purple-text); }
  .info-banner .plat-name { color: var(--text); }
  .info-banner .val-pos { color: var(--purple-light); }
  .info-banner .val-neg { color: var(--red-light); }
  .data-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 12px; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); font-size: 10px; font-weight: 700; color: #4ade80; letter-spacing: 0.04em; margin-left: 8px; vertical-align: middle; }
  .section { margin: 0 12px 16px; border-radius: 10px; overflow: hidden; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); }
  .section-header { display: flex; align-items: center; gap: 10px; padding: 14px 16px 10px; border-bottom: 1px solid var(--border); }
  .section-header .icon { font-size: 18px; }
  .section-header .title { font-size: 14px; font-weight: 700; letter-spacing: 0.03em; text-transform: uppercase; }
  .section-header .title.purple { color: var(--purple-light); }
  .section-header .title.red { color: var(--red-light); }
  .section-header .count { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.06); border-radius: 10px; padding: 2px 8px; }
  .col-header { display: grid; grid-template-columns: minmax(160px,1.5fr) 55px 65px 65px 70px 1fr; padding: 8px 16px; font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.35); letter-spacing: 0.08em; text-transform: uppercase; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.2); }
  .player-row { display: grid; grid-template-columns: minmax(160px,1.5fr) 55px 65px 65px 70px 1fr; align-items: center; padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 13px; transition: background 0.15s; }
  .player-row:hover { background: rgba(255,255,255,0.03); }
  .player-info { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .player-name { font-weight: 600; color: #f0f0f0; }
  .badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
  .badge-pos { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.08); }
  .badge-target { background: rgba(124,58,237,0.15); color: var(--purple-text); border: 1px solid rgba(124,58,237,0.3); }
  .badge-avoid { background: rgba(220,38,38,0.12); color: var(--red-text); border: 1px solid rgba(220,38,38,0.25); }
  .badge-inj { background: rgba(251,146,60,0.12); color: #fb923c; border: 1px solid rgba(251,146,60,0.25); font-size: 9px; }
  .team-label { font-size: 11px; color: rgba(255,255,255,0.35); }
  .adp-val { font-weight: 700; font-variant-numeric: tabular-nums; }
  .adp-val.positive { color: var(--purple-text); }
  .adp-val.negative { color: var(--red-text); }
  .consensus-val { color: rgba(255,255,255,0.55); font-variant-numeric: tabular-nums; }
  .delta-val { font-weight: 700; font-variant-numeric: tabular-nums; }
  .delta-val.positive { color: var(--purple-light); }
  .delta-val.negative { color: var(--red-light); }
  .delta-bar-wrap { width: 100%; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.06); position: relative; overflow: hidden; }
  .delta-bar-fill { position: absolute; top: 0; height: 100%; border-radius: 3px; transition: width 0.3s; }
  .delta-bar-fill.purple { background: linear-gradient(90deg, var(--purple), var(--purple-light)); left: 0; }
  .delta-bar-fill.red { background: linear-gradient(90deg, var(--red), var(--red-light)); right: 0; }
  .empty-msg { padding: 24px; text-align: center; color: rgba(255,255,255,0.3); font-size: 13px; }
  .footer { padding: 16px 24px 24px; text-align: center; font-size: 10px; color: var(--text-faint); border-top: 1px solid rgba(255,255,255,0.04); }
  @media (max-width: 640px) {

    .summary { flex-direction: column; }
    .controls-row { flex-direction: column; }
  }
</style>

let state = { platform:"sleeper", scoring:"half", threshold:5, posFilter:"ALL", search:"" };

function getADP(p, plat, sc) {
  var v = PLATFORM_CONFIG[plat].adp(p, sc);
  return (v === null || v === undefined || isNaN(v)) ? null : v;
}

function consensus(p, plat, sc) {
  var others = PLATFORMS.filter(function(x){ return x !== plat; });
  var vals = others.map(function(x){ return getADP(p, x, sc); }).filter(function(v){ return v !== null; });
  if (!vals.length) return null;
  return vals.reduce(function(a,b){ return a+b; }, 0) / vals.length;
}

function analyze() {
  var platform = state.platform, scoring = state.scoring,
      posFilter = state.posFilter, search = state.search, threshold = state.threshold;

  var list = RAW.map(function(p) {
    var adp = getADP(p, platform, scoring);
    var con = consensus(p, platform, scoring);
    if (adp === null || con === null) return null;
    return Object.assign({}, p, { adp_val: adp, con: con, delta: con - adp });
  }).filter(function(p){ return p !== null && p.adp_val <= 200; });

  if (posFilter !== "ALL") list = list.filter(function(p){ return p.pos === posFilter; });
  if (search) list = list.filter(function(p){ return p.n.toLowerCase().indexOf(search.toLowerCase()) !== -1; });

  var targets = list.filter(function(p){ return p.delta >= threshold; }).sort(function(a,b){ return b.delta - a.delta; });
  var avoids  = list.filter(function(p){ return p.delta <= -threshold; }).sort(function(a,b){ return a.delta - b.delta; });
  var all_d   = targets.concat(avoids).map(function(p){ return Math.abs(p.delta); });
  var maxD    = all_d.length ? Math.max.apply(null, all_d) : 1;
  return { all: list, targets: targets, avoids: avoids, maxD: maxD };
}

function playerRow(p, maxD) {
  var isVal = p.delta > 0;
  var pct   = Math.min((Math.abs(p.delta) / maxD) * 100, 100);
  var injBadge = p.inj ? '<span class="badge badge-inj">' + p.inj + '</span>' : '';
  var sign  = p.delta > 0 ? '+' : '';
  return '<div class="player-row">'
    + '<div class="player-info">'
    +   '<span class="player-name">' + p.n + '</span>'
    +   '<span class="badge badge-pos">' + p.pos + '</span>'
    +   '<span class="team-label">' + p.tm + '</span>'
    +   injBadge
    + '</div>'
    + '<div class="adp-val ' + (isVal ? 'positive' : 'negative') + '">' + p.adp_val.toFixed(1) + '</div>'
    + '<div class="consensus-val">' + p.con.toFixed(1) + '</div>'
    + '<div class="delta-val ' + (isVal ? 'positive' : 'negative') + '">' + sign + p.delta.toFixed(1) + '</div>'
    + '<div><span class="badge ' + (isVal ? 'badge-target' : 'badge-avoid') + '">' + (isVal ? 'TARGET' : 'AVOID') + '</span></div>'
    + '<div class="delta-bar-wrap"><div class="delta-bar-fill ' + (isVal ? 'purple' : 'red') + '" style="width:' + pct + '%"></div></div>'
    + '</div>';
}

function sectionHTML(title, icon, colorClass, rows, maxD, emptyMsg) {
  return '<div class="section">'
    + '<div class="section-header">'
    +   '<span class="icon">' + icon + '</span>'
    +   '<span class="title ' + colorClass + '">' + title + '</span>'
    +   '<span class="count">' + rows.length + '</span>'
    + '</div>'
    + '<div class="col-header"><span>Player</span><span>ADP</span><span>Consens.</span><span>Delta</span><span>Signal</span><span>Gap</span></div>'
    + (rows.length ? rows.map(function(p){ return playerRow(p, maxD); }).join('') : '<div class="empty-msg">' + emptyMsg + '</div>')
    + '</div>';
}

function render() {
  var platform = state.platform, scoring = state.scoring,
      threshold = state.threshold, posFilter = state.posFilter, search = state.search;
  var d = analyze();
  var others = PLATFORMS.filter(function(x){ return x !== platform; }).map(function(x){ return PLABELS[x]; }).join(', ');

  var html = '<div class="header">'
    + '<div class="header-brand">'
    +   '<div class="header-icon">R</div>'
    +   '<div>'
    +     '<div class="header-title">ADP Arbitrage Tool <span class="data-badge">&#9679; ' + DATA_TIMESTAMP + '</span></div>'
    +     '<div class="header-sub">Cross-Platform Draft Value Finder &middot; ROTOWIRE</div>'
    +   '</div>'
    + '</div>'
    + '<div class="controls-row">'
    +   '<div class="control-group">'
    +     '<label class="control-label">Your Draft Platform</label>'
    +     '<select class="platform-select" id="platformSel">'
    +     PLATFORMS.map(function(p){ return '<option value="' + p + '"' + (p === platform ? ' selected' : '') + '>' + PLABELS[p] + '</option>'; }).join('')
    +     '</select>'
    +   '</div>'
    +   '<div class="control-group">'
    +     '<label class="control-label">Scoring Format</label>'
    +     '<div class="scoring-toggle">'
    +     Object.keys(SLABELS).map(function(k){ return '<button class="scoring-btn' + (k === scoring ? ' active' : '') + '" data-sc="' + k + '">' + SLABELS[k] + '</button>'; }).join('')
    +     '</div>'
    +   '</div>'
    + '</div>'
    + '<div class="controls-row" style="margin-top:12px;align-items:flex-end">'
    +   '<div class="control-group" style="min-width:180px">'
    +     '<label class="control-label">Sensitivity: &plusmn;' + threshold + ' picks</label>'
    +     '<div class="slider-row">'
    +       '<span class="slider-label">Tight</span>'
    +       '<input type="range" class="sensitivity-slider" id="threshSlider" min="2" max="25" value="' + threshold + '">'
    +       '<span class="slider-label">Wide</span>'
    +     '</div>'
    +   '</div>'
    +   '<div class="control-group">'
    +     '<input type="text" class="search-input" id="searchInput" placeholder="Search player..." value="' + search + '">'
    +   '</div>'
    + '</div>'
    + '<div class="pos-filters">'
    + POSITIONS.map(function(p){ return '<button class="pos-btn' + (p === posFilter ? ' active' : '') + '" data-pos="' + p + '">' + p + '</button>'; }).join('')
    + '</div>'
    + '</div>'

    + '<div class="summary">'
    +   '<div class="summary-card target"><div class="summary-label">Targets Found</div><div class="summary-num">' + d.targets.length + '</div><div class="summary-desc">Undervalued on ' + PLABELS[platform] + '</div></div>'
    +   '<div class="summary-card avoid"><div class="summary-label">Players to Avoid</div><div class="summary-num">' + d.avoids.length + '</div><div class="summary-desc">Overvalued on ' + PLABELS[platform] + '</div></div>'
    +   '<div class="summary-card neutral"><div class="summary-label">Players Scanned</div><div class="summary-num">' + d.all.length + '</div><div class="summary-desc">Top 200 &middot; ' + SLABELS[scoring] + '</div></div>'
    + '</div>'

    + '<div class="info-banner"><strong>How it works:</strong> We compare each player\'s ADP on <span class="plat-name">' + PLABELS[platform] + '</span> against the consensus of ' + others + '. A <strong class="val-pos">positive delta</strong> means the player goes later on ' + PLABELS[platform] + ' than consensus &mdash; a steal. A <strong class="val-neg">negative delta</strong> means they\'re being drafted too early.</div>'

    + sectionHTML('Target on ' + PLABELS[platform], '&#127919;', 'purple', d.targets, d.maxD, 'No targets found at this sensitivity. Try lowering the threshold.')
    + '<div style="height:8px"></div>'
    + sectionHTML('Avoid on ' + PLABELS[platform], '&#128683;', 'red', d.avoids, d.maxD, 'No avoids found at this sensitivity. Try lowering the threshold.')

    + '<div class="footer">ADP Arbitrage Tool &middot; Data from RotoWire &middot; Last fetched: ' + DATA_TIMESTAMP + ' &middot; ' + DATA_COUNT + ' players loaded</div>';

  document.getElementById('app').innerHTML = html;

  document.getElementById('platformSel').onchange = function(e) { state.platform = e.target.value; render(); };
  document.querySelectorAll('.scoring-btn').forEach(function(b) { b.onclick = function() { state.scoring = b.dataset.sc; render(); }; });
  document.getElementById('threshSlider').oninput = function(e) { state.threshold = +e.target.value; render(); };
  document.getElementById('searchInput').oninput = function(e) { state.search = e.target.value; render(); };
  document.querySelectorAll('.pos-btn').forEach(function(b) { b.onclick = function() { state.posFilter = b.dataset.pos; render(); }; });
  var si = document.getElementById('searchInput');
  si.focus(); si.setSelectionRange(si.value.length, si.value.length);
}

render();
</script>
</body>
</html>
